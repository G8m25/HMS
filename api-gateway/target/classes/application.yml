server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**

        - id: doctor-service
          uri: lb://doctor-service
          predicates:
            - Path=/doctors/**

        - id: patient-service
          uri: lb://patient-service
          predicates:
            - Path=/patients/**

        - id: appointment-service
          uri: lb://appointment-service
          predicates:
            - Path=/appointments/**

        - id: billing-service
          uri: lb://billing-service
          predicates:
            - Path=/billing/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: HMS_Super_Secret_Key_For_JWT_Token_Generation_2024_Must_Be_Long_Enough
